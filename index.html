<!DOCTYPE html>
<html>
<head>
    <meta name="figmin">
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; width: 250px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; background: #00d1b2; color: white; border: none; border-radius: 8px; width: 100%; font-weight: bold; }
        #status { margin-top: 10px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
    <h3>Mesa ONCE XR</h3>
    <button id="btnMover">SUBIR / BAJAR</button>
    <div id="status">Iniciando...</div>

    <script>
        let base = null;
        let tablero = null;
        let subiendo = false;
        let alturaY = 0; // Desplazamiento vertical respecto a la base
        
        const DISTANCIA_MAX = 0.5; 
        const VELOCIDAD = 0.3;
        const statusText = document.getElementById("status");

        document.addEventListener("FigminReady", function() {
            statusText.innerText = "Cargando Base...";

            // 1. Crear Base
            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/base.glb",
                position: figmin.getWindowSpawnPosition()
            });

            base.onStart(function() {
                statusText.innerText = "Cargando Tablero...";
                
                // 2. Crear Tablero (Lo creamos en la misma posición que la base)
                tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                    url: "https://vallejo83-maker.github.io/ONCE-XR/tablero.glb",
                    position: base.transform.position
                });

                tablero.onStart(function() {
                    statusText.innerText = "¡Mesa sincronizada!";
                });
            });

            document.getElementById("btnMover").onclick = function() {
                subiendo = !subiendo;
                statusText.innerText = subiendo ? "Subiendo..." : "Bajando...";
            };

            figmin.setUpdateFunction(update);
        });

        function update(dt) {
            // Si ambos existen, forzamos que el tablero siga a la base
            if (base && base.transform && tablero && tablero.transform) {
                
                // A. Calculamos la elevación (0 a DISTANCIA_MAX)
                if (subiendo && alturaY < DISTANCIA_MAX) {
                    alturaY += VELOCIDAD * dt;
                } else if (!subiendo && alturaY > 0) {
                    alturaY -= VELOCIDAD * dt;
                }

                // B. SINCRONIZACIÓN MANUAL (Plan B)
                // Obtenemos la posición de la base en el mundo real
                let bPos = base.transform.position;
                let bRot = base.transform.rotation;

                // El tablero copia la posición de la base, pero le sumamos la alturaY
                tablero.transform.position = { 
                    x: bPos.x, 
                    y: bPos.y + alturaY, 
                    z: bPos.z 
                };

                // El tablero copia la rotación de la base para que no se gire solo
                tablero.transform.rotation = bRot;
            }
        }
    </script>
</body>
</html>
