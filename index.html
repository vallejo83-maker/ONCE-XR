<!DOCTYPE html>
<html>

<head>
    <meta name="figmin">
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 15px;
            width: 260px;
            border: 2px solid #00d1b2;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            background: #00d1b2;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            color: black;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-sm {
            width: 35px;
            height: 35px;
            font-size: 20px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .val {
            min-width: 50px;
            font-family: monospace;
            color: #00d1b2;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h3 style="margin-top:0">Panel Mesa ONCE</h3>
    <button id="btnMover" class="btn-main">SUBIR / BAJAR</button>

    <div class="row"><span>X</span>
        <div class="controls"><button id="mx">-</button><span id="tx">0.00</span><button id="px">+</button></div>
    </div>
    <div class="row"><span>Y</span>
        <div class="controls"><button id="my">-</button><span id="ty">0.00</span><button id="py">+</button></div>
    </div>
    <div class="row"><span>Z</span>
        <div class="controls"><button id="mz">-</button><span id="tz">0.00</span><button id="pz">+</button></div>
    </div>

    <script>
        let base = null, tablero = null, subiendo = false, alturaY = 0;
        let ox = 0, oy = 0, oz = 0;
        let baseReady = false, tableroReady = false;
        // anchorPos: posición real de la base capturada en onStart (no en FigminReady)
        // getWindowSpawnPosition() puede devolver {0,0,0} antes de que la ventana esté lista
        let anchorPos = null;
        const DIST_MAX = 0.5, VEL = 0.3;

        document.addEventListener("FigminReady", () => {
            const escalaInicial = { x: 1, y: 1, z: 1 };
            const spawnPos = figmin.getWindowSpawnPosition();

            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/base.glb",
                position: spawnPos,
                scale: escalaInicial
            });

            tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/tablero.glb",
                position: spawnPos,
                scale: escalaInicial
            });

            // onStart: capturamos la posición REAL de la base una vez que está colocada en el mundo
            base.onStart(() => {
                if (base.physics) base.physics.enabled = false;
                // Guardamos la posición real del objeto tras su colocación en la escena
                anchorPos = {
                    x: base.transform.position.x,
                    y: base.transform.position.y,
                    z: base.transform.position.z
                };
                figmin.print("Base lista en: " + JSON.stringify(anchorPos));
                baseReady = true;
            });

            tablero.onStart(() => {
                if (tablero.physics) tablero.physics.enabled = false;
                tableroReady = true;
            });

            // ASIGNACIÓN DE BOTONES
            document.getElementById("btnMover").onclick = () => { subiendo = !subiendo; };
            document.getElementById("px").onclick = () => { ox += 0.01; updateUI(); };
            document.getElementById("mx").onclick = () => { ox -= 0.01; updateUI(); };
            document.getElementById("py").onclick = () => { oy += 0.01; updateUI(); };
            document.getElementById("my").onclick = () => { oy -= 0.01; updateUI(); };
            document.getElementById("pz").onclick = () => { oz += 0.01; updateUI(); };
            document.getElementById("mz").onclick = () => { oz -= 0.01; updateUI(); };

            figmin.setUpdateFunction(update);
        });

        function updateUI() {
            document.getElementById("tx").innerText = ox.toFixed(2);
            document.getElementById("ty").innerText = oy.toFixed(2);
            document.getElementById("tz").innerText = oz.toFixed(2);
        }

        function update(dt) {
            // Esperar a que ambos objetos estén listos Y que anchorPos esté capturado
            if (!baseReady || !tableroReady || !anchorPos) return;

            // 1. Animación de altura (con clamp)
            if (subiendo && alturaY < DIST_MAX) { alturaY = Math.min(alturaY + VEL * dt, DIST_MAX); }
            else if (!subiendo && alturaY > 0) { alturaY = Math.max(alturaY - VEL * dt, 0); }

            // 2. Leer escala y rotación en vivo de la base (para seguir cambios del usuario)
            const sc = base.transform.scale;
            const rot = base.transform.rotation;

            // 3. Sincronizar escala y rotación del tablero con la base
            tablero.transform.scale = { x: sc.x, y: sc.y, z: sc.z };
            tablero.transform.rotation = { x: rot.x, y: rot.y, z: rot.z };

            // 4. Posición: anchorPos (fijo, capturado en onStart) + offsets escalados
            tablero.transform.position = {
                x: anchorPos.x + (ox * sc.x),
                y: anchorPos.y + ((alturaY + oy) * sc.y),
                z: anchorPos.z + (oz * sc.z)
            };
        }
    </script>
</body>

</html>
