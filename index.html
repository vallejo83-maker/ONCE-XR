<!DOCTYPE html>
<html>
<head>
    <meta name="figmin">
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; width: 250px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; background: #00d1b2; color: white; border: none; border-radius: 8px; width: 100%; font-weight: bold; }
        #status { margin-top: 10px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
    <h3>Mesa ONCE XR</h3>
    <button id="btnMover">SUBIR / BAJAR</button>
    <div id="status">Esperando a Figmin XR...</div>

    <script>
        let base = null;
        let tablero = null;
        let subiendo = false;
        let alturaY = 0;
        
        const DISTANCIA_MAX = 0.5; 
        const VELOCIDAD = 0.3;
        const statusText = document.getElementById("status");

        // Esta es la función que hace que Figmin empiece a trabajar
        document.addEventListener("FigminReady", function() {
            statusText.innerText = "Figmin detectado. Cargando...";

            // 1. Crear Base
            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/base.glb",
                position: figmin.getWindowSpawnPosition()
            });

            // 2. Cuando la base cargue, crear tablero
            base.onStart(function() {
                statusText.innerText = "Base lista. Cargando tablero...";
                
                tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                    url: "https://vallejo83-maker.github.io/ONCE-XR/tablero.glb",
                    parent: base,
                    position: { x: 0, y: 0, z: 0 },
                    rotation: { x: 0, y: 0, z: 0 }
                });

                tablero.onStart(function() {
                    statusText.innerText = "¡Mesa lista!";
                });
            });

            // Configurar botón
            document.getElementById("btnMover").onclick = function() {
                subiendo = !subiendo;
                statusText.innerText = subiendo ? "Subiendo..." : "Bajando...";
            };

            // Iniciar bucle de movimiento
            figmin.setUpdateFunction(update);
        });

        function update(dt) {
            // Solo movemos si el tablero está listo
            if (tablero && tablero.transform) {
                if (subiendo && alturaY < DISTANCIA_MAX) {
                    alturaY += VELOCIDAD * dt;
                } else if (!subiendo && alturaY > 0) {
                    alturaY -= VELOCIDAD * dt;
                }
                
                // Aplicar altura
                tablero.transform.position = { x: 0, y: alturaY, z: 0 };
            }
        }
    </script>
</body>
</html>
