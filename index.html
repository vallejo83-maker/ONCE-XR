<!DOCTYPE html>
<html>
<head>
    <meta name="figmin">
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 15px; width: 280px; }
        .btn-main { width: 100%; padding: 20px; font-size: 18px; background: #00d1b2; border: none; border-radius: 10px; color: black; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-sm { width: 40px; height: 40px; font-size: 24px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-sm:active { background: #666; }
        .val { min-width: 60px; font-family: monospace; font-size: 16px; color: #00d1b2; }
        label { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Control de Mesa XR</h3>
    
    <button id="btnMover" class="btn-main">SUBIR / BAJAR</button>
    
    <div class="row">
        <label>Offset X</label>
        <div class="controls">
            <button onclick="changeOff('x', -0.01)" class="btn-sm">-</button>
            <span id="txtX" class="val">0.00</span>
            <button onclick="changeOff('x', 0.01)" class="btn-sm">+</button>
        </div>
    </div>

    <div class="row">
        <label>Offset Y</label>
        <div class="controls">
            <button onclick="changeOff('y', -0.01)" class="btn-sm">-</button>
            <span id="txtY" class="val">0.00</span>
            <button onclick="changeOff('y', 0.01)" class="btn-sm">+</button>
        </div>
    </div>

    <div class="row">
        <label>Offset Z</label>
        <div class="controls">
            <button onclick="changeOff('z', -0.01)" class="btn-sm">-</button>
            <span id="txtZ" class="val">0.00</span>
            <button onclick="changeOff('z', 0.01)" class="btn-sm">+</button>
        </div>
    </div>

    <script>
        let base = null, tablero = null;
        let subiendo = false;
        let alturaAnim = 0;
        let offX = 0, offY = 0, offZ = 0;

        const DIST_MAX = 0.5;
        const VEL = 0.3;

        // Función para los botones +/-
        window.changeOff = function(axis, amount) {
            if(axis === 'x') offX += amount;
            if(axis === 'y') offY += amount;
            if(axis === 'z') offZ += amount;
            document.getElementById('txtX').innerText = offX.toFixed(2);
            document.getElementById('txtY').innerText = offY.toFixed(2);
            document.getElementById('txtZ').innerText = offZ.toFixed(2);
        };

        document.addEventListener("FigminReady", () => {
            // Cargar Base
            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/base.glb",
                position: figmin.getWindowSpawnPosition()
            });

            // Cargar Tablero
            tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/tablero.glb",
                position: figmin.getWindowSpawnPosition()
            });

            document.getElementById("btnMover").onclick = () => {
                subiendo = !subiendo;
            };

            figmin.setUpdateFunction(update);
        });

        function update(dt) {
            if (!base || !base.transform || !tablero || !tablero.transform) return;

            // 1. Animación suave
            if (subiendo && alturaAnim < DIST_MAX) {
                alturaAnim += VEL * dt;
            } else if (!subiendo && alturaAnim > 0) {
                alturaAnim -= VEL * dt;
            }

            // 2. Referencia de la base
            const bPos = base.transform.position;
            const bRot = base.transform.rotation;
            const bScale = base.transform.scale;

            // 3. Sincronizar Escala (Forzado total)
            tablero.transform.scale = { x: bScale.x, y: bScale.y, z: bScale.z };
            
            // 4. Sincronizar Rotación
            tablero.transform.rotation = { x: bRot.x, y: bRot.y, z: bRot.z };

            // 5. Sincronizar Posición (Simplificado para evitar errores de eje)
            // Sumamos la altura animada + el offset manual, todo multiplicado por la escala
            tablero.transform.position = {
                x: bPos.x + (offX * bScale.x),
                y: bPos.y + ((alturaAnim + offY) * bScale.y),
                z: bPos.z + (offZ * bScale.z)
            };
        }
    </script>
</body>
</html>
