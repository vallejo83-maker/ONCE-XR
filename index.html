<!DOCTYPE html>
<html>
<head>
    <meta name="figmin">
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            color: white; 
            background: rgba(0,0,0,0.8); 
            padding: 20px; 
            border-radius: 15px; 
            width: 300px; /* Ancho fijo para que se vea bien en VR */
        }
        button { 
            padding: 15px 25px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            background: #00d1b2; 
            color: #1a1a1a; 
            border: none; 
            border-radius: 8px;
            box-shadow: 0 5px #008f7a;
        }
        button:active { 
            box-shadow: 0 2px #008f7a; 
            transform: translateY(3px); 
        }
        .info { margin-top: 15px; font-size: 12px; opacity: 0.7; }
    </script>
</head>
<body>
    <h2>Mesa Elevable</h2>
    <button id="btnMover">SUBIR / BAJAR</button>
    <p class="info">Sube los GLB a la misma carpeta en GitHub</p>

    <script>
        let base = null;
        let tablero = null;
        let subiendo = false;
        let alturaY = 0; // Empieza en 0 porque usamos el origen común de pCon
        
        // --- PARÁMETROS QUE PUEDES TOCAR ---
        const DISTANCIA_MAX = 0.5; // Cuántos metros sube la mesa (50cm)
        const VELOCIDAD = 0.3;     // Metros por segundo
        // -----------------------------------

        document.addEventListener("FigminReady", () => {
            console.log("Figmin XR Listo");
            init();
        });

        function init() {
            // Creamos la Base
            // Nota: Al usar solo el nombre del archivo, Figmin lo busca 
            // en la misma carpeta que este HTML en tu GitHub.
            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "base.glb", 
                position: figmin.getWindowSpawnPosition()
            });

            base.onStart(() => {
                // Creamos el Tablero como HIJO de la base
                tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                    url: "tablero.glb",
                    parent: base,
                    position: { x: 0, y: 0, z: 0 } // Se alinea solo gracias a pCon
                });
            });

            document.getElementById("btnMover").onclick = () => {
                subiendo = !subiendo;
            };

            figmin.setUpdateFunction(update);
        }

       function update(dt) {
    if (!tablero) return;

    // Lógica de movimiento
    if (subiendo && alturaY < DISTANCIA_MAX) {
        alturaY += VELOCIDAD * dt;
    } else if (!subiendo && alturaY > 0) {
        alturaY -= VELOCIDAD * dt;
    }

    // APLICAR POSICIÓN DE FORMA SEGURA
    let pos = tablero.transform.position; // Obtenemos la posición actual
    pos.y = alturaY;                      // Solo cambiamos la altura
    tablero.transform.position = pos;     // Reasignamos el objeto completo
}
    </script>
</body>
</html>
