<!DOCTYPE html>
<html>
<head>
    <meta name="figmin">
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 15px; width: 260px; }
        .btn-main { width: 100%; padding: 15px; font-size: 16px; background: #00d1b2; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .controls { display: flex; align-items: center; gap: 8px; }
        .btn-sm { width: 35px; height: 35px; font-size: 20px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .val { min-width: 50px; font-family: monospace; color: #00d1b2; font-size: 14px; }
    </style>
</head>
<body>
    <h3>Mesa ONCE XR</h3>
    <button id="btnMover" class="btn-main">SUBIR / BAJAR</button>
    
    <div class="row"><span>X</span><div class="controls"><button id="mx">-</button><span id="tx">0.00</span><button id="px">+</button></div></div>
    <div class="row"><span>Y</span><div class="controls"><button id="my">-</button><span id="ty">0.00</span><button id="py">+</button></div></div>
    <div class="row"><span>Z</span><div class="controls"><button id="mz">-</button><span id="tz">0.00</span><button id="pz">+</button></div></div>

    <script>
        let base = null, tablero = null, subiendo = false, alturaY = 0;
        let ox = 0, oy = 0, oz = 0;
        const DIST_MAX = 0.5, VEL = 0.3;

        document.addEventListener("FigminReady", () => {
            // CARGA DE MODELOS (URL completa para asegurar descarga)
            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/base.glb",
                position: figmin.getWindowSpawnPosition()
            });

            tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/tablero.glb",
                position: figmin.getWindowSpawnPosition()
            });

            // BOTÓN PRINCIPAL
            document.getElementById("btnMover").onclick = () => { subiendo = !subiendo; };

            // BOTONES DE OFFSET (Asignación directa para evitar errores)
            document.getElementById("px").onclick = () => { ox += 0.01; updateLabels(); };
            document.getElementById("mx").onclick = () => { ox -= 0.01; updateLabels(); };
            document.getElementById("py").onclick = () => { oy += 0.01; updateLabels(); };
            document.getElementById("my").onclick = () => { oy -= 0.01; updateLabels(); };
            document.getElementById("pz").onclick = () => { oz += 0.01; updateLabels(); };
            document.getElementById("mz").onclick = () => { oz -= 0.01; updateLabels(); };

            figmin.setUpdateFunction(update);
        });

        function updateLabels() {
            document.getElementById("tx").innerText = ox.toFixed(2);
            document.getElementById("ty").innerText = oy.toFixed(2);
            document.getElementById("tz").innerText = oz.toFixed(2);
        }

        function update(dt) {
            // VERIFICACIÓN DE SEGURIDAD (Si esto falla, el tablero se queda en el 0)
            if (!base || !base.transform || !tablero || !tablero.transform) return;

            // 1. Animación de subida
            if (subiendo && alturaY < DIST_MAX) { alturaY += VEL * dt; }
            else if (!subiendo && alturaY > 0) { alturaY -= VEL * dt; }

            // 2. REFERENCIA MAESTRA (La base manda)
            const bPos = base.transform.position;
            const bRot = base.transform.rotation;
            const bScale = base.transform.scale;

            // 3. SINCRONIZACIÓN TOTAL (Tablero copia a la base)
            tablero.transform.rotation = { x: bRot.x, y: bRot.y, z: bRot.z };
            tablero.transform.scale = { x: bScale.x, y: bScale.y, z: bScale.z };

            // 4. POSICIÓN (Base + Offset manual + Animación de altura)
            // Multiplicamos por la escala para que si agrandas la mesa, el hueco no se rompa
            tablero.transform.position = {
                x: bPos.x + (ox * bScale.x),
                y: bPos.y + ((alturaY + oy) * bScale.y),
                z: bPos.z + (oz * bScale.z)
            };
        }
    </script>
</body>
</html>
