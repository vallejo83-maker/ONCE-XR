<!DOCTYPE html>
<html>
<head>
    <meta name="figmin">
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; width: 260px; }
        button { padding: 10px; cursor: pointer; background: #00d1b2; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .main-btn { width: 100%; font-size: 16px; margin-bottom: 15px; padding: 15px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .controls { display: flex; align-items: center; gap: 5px; }
        .btn-sm { width: 30px; height: 30px; padding: 0; font-size: 20px; }
        .val { width: 50px; text-align: center; font-family: monospace; color: #00d1b2; }
    </style>
</head>
<body>
    <h3>Mesa ONCE XR</h3>
    <button id="btnMover" class="main-btn">SUBIR / BAJAR</button>
    
    <div class="row">
        <span>Offset X</span>
        <div class="controls">
            <button onclick="adj('offX', -0.01)" class="btn-sm">-</button>
            <div id="offX" class="val">0.00</div>
            <button onclick="adj('offX', 0.01)" class="btn-sm">+</button>
        </div>
    </div>
    <div class="row">
        <span>Offset Y</span>
        <div class="controls">
            <button onclick="adj('offY', -0.01)" class="btn-sm">-</button>
            <div id="offY" class="val">0.00</div>
            <button onclick="adj('offY', 0.01)" class="btn-sm">+</button>
        </div>
    </div>
    <div class="row">
        <span>Offset Z</span>
        <div class="controls">
            <button onclick="adj('offZ', -0.01)" class="btn-sm">-</button>
            <div id="offZ" class="val">0.00</div>
            <button onclick="adj('offZ', 0.01)" class="btn-sm">+</button>
        </div>
    </div>

    <script>
        let base = null, tablero = null, subiendo = false, alturaY = 0;
        let ox = 0, oy = 0, oz = 0;
        const DIST_MAX = 0.5, VEL = 0.3;

        // Función para ajustar valores desde los botones
        function adj(axis, val) {
            if (axis === 'offX') ox += val;
            if (axis === 'offY') oy += val;
            if (axis === 'offZ') oz += val;
            document.getElementById(axis).innerText = (axis === 'offX' ? ox : axis === 'offY' ? oy : oz).toFixed(2);
        }

        document.addEventListener("FigminReady", () => {
            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/base.glb",
                position: figmin.getWindowSpawnPosition()
            });

            tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/tablero.glb",
                position: figmin.getWindowSpawnPosition(),
                active: false // Empezamos ocultos hasta sincronizar
            });

            document.getElementById("btnMover").onclick = () => { subiendo = !subiendo; };
            figmin.setUpdateFunction(update);
        });

        function update(dt) {
            if (!base || !base.transform || !tablero || !tablero.transform) return;

            // Hacer visible el tablero solo cuando la base esté lista
            if (!tablero.active) tablero.active = true;

            // 1. Animación altura
            if (subiendo && alturaY < DIST_MAX) alturaY += VEL * dt;
            else if (!subiendo && alturaY > 0) alturaY -= VEL * dt;

            const b = base.transform;
            const t = tablero.transform;

            // 2. Sincronizar ESCALA (Solo si cambia significativamente)
            if (Math.abs(t.scale.x - b.scale.x) > 0.001) {
                t.scale = { x: b.scale.x, y: b.scale.y, z: b.scale.z };
            }

            // 3. Sincronizar ROTACIÓN
            t.rotation = { x: b.rotation.x, y: b.rotation.y, z: b.rotation.z };

            // 4. POSICIÓN LOCAL (Cálculo vectorial para respetar inclinación)
            const radX = b.rotation.x * Math.PI / 180;
            const radY = b.rotation.y * Math.PI / 180;
            const radZ = b.rotation.z * Math.PI / 180;

            // Vector Up de la mesa
            const upX = Math.sin(radZ) * Math.cos(radX);
            const upY = Math.cos(radZ) * Math.cos(radX);
            const upZ = -Math.sin(radX);

            // Vector Right de la mesa (para Offset X)
            const rtX = Math.cos(radZ) * Math.cos(radY);
            const rtY = -Math.sin(radZ) * Math.cos(radY);
            const rtZ = Math.sin(radY);

            // Aplicamos posición sumando la base + movimiento local (elevación + offsets)
            const desplY = (alturaY + oy) * b.scale.y;
            const desplX = ox * b.scale.x;
            const desplZ = oz * b.scale.z;

            t.position = {
                x: b.position.x + (upX * desplY) + (rtX * desplX),
                y: b.position.y + (upY * desplY) + (rtY * desplX),
                z: b.position.z + (upZ * desplY) + desplZ
            };
        }
    </script>
</body>
</html>
