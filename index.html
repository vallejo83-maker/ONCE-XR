<!DOCTYPE html>
<html>
<head>
    <meta name="figmin">
    <style>
        body { font-family: sans-serif; text-align: center; color: white; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; width: 250px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; background: #00d1b2; color: white; border: none; border-radius: 8px; width: 100%; font-weight: bold; }
        #status { margin-top: 10px; font-size: 11px; color: #aaa; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h3>Mesa ONCE XR</h3>
    <button id="btnMover">SUBIR / BAJAR</button>
    <div id="status">Iniciando sistema...</div>

    <script>
        let base = null;
        let tablero = null;
        let subiendo = false;
        let alturaY = 0;
        
        const DISTANCIA_MAX = 0.5; 
        const VELOCIDAD = 0.3;
        const statusText = document.getElementById("status");

        function log(msg) {
            statusText.innerText = msg;
            console.log(msg);
        }

        document.addEventListener("FigminReady", () => {
            log("Cargando Base...");

            // 1. Cargamos la Base
            base = figmin.createObject(figmin.ObjectType.MODEL3D, {
                url: "https://vallejo83-maker.github.io/ONCE-XR/base.glb",
                position: figmin.getWindowSpawnPosition()
            });

            // Si la base da error
            base.onError((err) => log("Error en Base: " + err));

            // Cuando la base esté lista
            base.onStart(() => {
                log("Base lista.\nCargando Tablero...");
                
                // 2. Cargamos el Tablero
                // He quitado el 'parent' momentáneamente para descartar que sea el problema
                tablero = figmin.createObject(figmin.ObjectType.MODEL3D, {
                    url: "https://vallejo83-maker.github.io/ONCE-XR/tablero.glb",
                    position: base.transform.position // Lo ponemos en el mismo sitio que la base
                });

                tablero.onStart(() => {
                    log("Mesa completa.\nVinculando piezas...");
                    // Una vez cargado, lo hacemos hijo de la base
                    tablero.parent = base;
                    tablero.transform.position = { x: 0, y: 0, z: 0 };
                    tablero.transform.rotation = { x: 0, y: 0, z: 0 };
                    log("¡Todo listo!");
                });

                tablero.onError((err) => log("Error en Tablero: " + err));
            });

            document.getElementById("btnMover").onclick = () => {
                subiendo = !subiendo;
                log(subiendo ? "Subiendo..." : "Bajando...");
            };

            figmin.setUpdateFunction(update);
        });

        function update(dt) {
            // Solo movemos si el tablero existe y TIENE UN PADRE (la base)
            if (tablero && tablero.parent && tablero.transform) {
                if (subiendo && alturaY < DISTANCIA_MAX) {
                    alturaY += VELOCIDAD * dt;
                } else if (!subiendo && alturaY > 0) {
                    alturaY -= VELOCIDAD * dt;
                }

                tablero.transform.position = { x: 0, y: alturaY, z: 0 };
            }
        }
    </script>
</body>
</html>
